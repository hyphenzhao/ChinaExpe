# 玄学助手 - Apache Reverse Proxy Configuration
# Port 8888 -> FastAPI on 127.0.0.1:8765

<VirtualHost *:1248>
    ServerAdmin webmaster@localhost

    # Proxy all traffic to FastAPI
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8765/
    ProxyPassReverse / http://127.0.0.1:8765/

    # Disable buffering for SSE streaming
    SetEnv proxy-sendcl 1
    SetEnv proxy-receivebuffer 0

    # SSE-specific: disable gzip and buffering on chat messages endpoint
    <Location /api/chats/>
        SetEnv no-gzip 1
    </Location>

    <Proxy *>
        Require all granted
    </Proxy>

    ErrorLog ${APACHE_LOG_DIR}/xuanxue_error.log
    CustomLog ${APACHE_LOG_DIR}/xuanxue_access.log combined
</VirtualHost>
